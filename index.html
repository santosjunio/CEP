<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEP</title>
<link rel="stylesheet" href="src/styles/style.css">
<script src="src/js/ar.js" defer></script>
</head>
<body>

<header class="main-header">
  <div class="header-container">

    <a href="" class="logo">
      <img src="src/assets/img/logo.svg" alt="e-Commerce Logo">
    </a>

    
    <nav class="nav-menu">
      <ul>
        <li><a href="">Home</a></li>
        <li><a href="">Produtos</a></li>
        <li><a href="">Sobre nós</a></li>
        <li><a href="">Contato</a></li>
      </ul>
    </nav>


    <div class="header-btn">
      <a href="" class="btn-login">Login</a>
    </div>
  </div>
</header>
    
<main class="content">
  <section class="product-section">
    <div class="product-wrapper">
      <div class="product-gallery">
        <img src="src/assets/img/Product.svg" alt="MacBook Pro" class="notebook-image">
      </div>
      
      <div class="product-info">
        <div class="rating-block">
          <span class="rating-avl">Avaliação</span>
          <span class="stars-text">5.0 Estrelas</span>
          <span class="total-ratings">21671 avaliações</span>
        </div>
        
        <h1 class="product-title">2020 Apple MacBook Pro with Apple M1 Chip 13-inch 8GB RAM 256GB SSD Storage Space Gray</h1>
        
        <div class="price-block">
          <span class="current-price">R$ 5.299,00</span>
          <span class="old-price">R$ 7.000,00</span>
          <span class="discount-tag">24.3 OFF</span>
        </div>
        
        <div class="color-selection">
          <span class="color-text">Cor</span>
          <div class="color-options">
            <button class="color-circle dark-color"></button>
            <button class="color-circle light-color"></button>
          </div>
        </div>
        
        <button class="car-button">Adicionar no carrinho</button>
      </div>
    </div>
  </section>
</main>

</body>
</html>
